apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resume-tailor
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/allen92524/resume-tailor.git
    targetRevision: main
    path: helm/resume-tailor
    helm:
      parameters:
        - name: apiKey
          value: ""
      valueFiles: []
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
