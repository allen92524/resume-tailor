name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip release commits to avoid infinite loop
    if: "!startsWith(github.event.head_commit.message, 'release:')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Determine version bump type
        id: bump
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
          BUMP="skip"

          # 1. Check the head commit message itself (works for squash merges)
          if echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE" || echo "$FIRST_LINE" | grep -qE "^feat!:"; then
            BUMP="major"
          elif echo "$FIRST_LINE" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$FIRST_LINE" | grep -qE "^fix(\(.+\))?:"; then
            BUMP="patch"
          fi

          # 2. If no match yet, extract PR number and check PR title + commits
          if [ "$BUMP" = "skip" ]; then
            PR_NUM=$(echo "$FIRST_LINE" | grep -oE '#[0-9]+' | head -1 | tr -d '#')

            if [ -n "$PR_NUM" ]; then
              echo "Checking PR #$PR_NUM for conventional commits..."

              # Check PR title
              PR_TITLE=$(gh pr view "$PR_NUM" --json title --jq '.title' 2>/dev/null || true)
              echo "PR title: $PR_TITLE"

              if echo "$PR_TITLE" | grep -qE "BREAKING CHANGE" || echo "$PR_TITLE" | grep -qE "^feat!:"; then
                BUMP="major"
              elif echo "$PR_TITLE" | grep -qE "^feat(\(.+\))?:"; then
                BUMP="minor"
              elif echo "$PR_TITLE" | grep -qE "^fix(\(.+\))?:"; then
                BUMP="patch"
              fi

              # Check individual PR commits if still no match
              if [ "$BUMP" = "skip" ]; then
                COMMITS=$(gh pr view "$PR_NUM" --json commits --jq '.commits[].messageHeadline' 2>/dev/null || true)
                echo "PR commits:"
                echo "$COMMITS"

                if echo "$COMMITS" | grep -qE "BREAKING CHANGE" || echo "$COMMITS" | grep -qE "^feat!:"; then
                  BUMP="major"
                elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
                  BUMP="minor"
                elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
                  BUMP="patch"
                fi
              fi
            fi
          fi

          echo "Determined bump type: $BUMP"
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Skip non-release commits
        if: steps.bump.outputs.type == 'skip'
        run: echo "Commit does not require a version bump — skipping release."

      - name: Calculate new version
        if: steps.bump.outputs.type != 'skip'
        id: version
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          # Get current version from the latest git tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LATEST_TAG" ]; then
            CURRENT_VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          else
            CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP_TYPE" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          TAG="v${NEW_VERSION}"
          echo "Bumping $BUMP_TYPE: $CURRENT_VERSION -> $NEW_VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag via GitHub API
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          echo "Creating tag $TAG at commit $SHA"
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/$TAG" \
            -f sha="$SHA"

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
