services:
  resume-tailor:
    build: .
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux support
    volumes:
      - ~/.resume-tailor:/root/.resume-tailor
      - ./output:/output
      - ${HOME}/Downloads:/mnt/downloads:ro
      - ${HOME}/Desktop:/mnt/desktop:ro
      - ${HOME}/Documents:/mnt/documents:ro
      - ./input:/mnt/input:ro
    command: ["generate", "--format", "pdf", "--output", "/output/"]
