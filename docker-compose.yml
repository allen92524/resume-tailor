services:
  resume-tailor:
    build: .
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - HOST_UID=${UID:-1000}
      - HOST_GID=${GID:-1000}
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux support
    volumes:
      - ~/.resume-tailor:/root/.resume-tailor
      - ./output:/output
    command: ["generate", "--format", "pdf", "--output", "/output/"]
